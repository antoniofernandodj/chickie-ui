<div class="min-h-[calc(100dvh-4rem)] flex items-center justify-center px-4 py-12"
     style="background: var(--color-surface)">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8 text-center">

      @if (estado() === 'loading') {
        <ui-spinner size="lg" class="mx-auto mb-6 block"/>
        <h1 class="text-xl font-semibold text-gray-800">Confirmando seu cadastro...</h1>
        <p class="text-sm text-gray-400 mt-2">Aguarde um instante.</p>
      }

      @if (estado() === 'success') {
        <div class="w-16 h-16 mx-auto mb-6 rounded-2xl flex items-center justify-center bg-green-50">
          <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Cadastro confirmado!</h1>
        <p class="text-sm text-gray-500">Redirecionando para o app...</p>
      }

      @if (estado() === 'error') {
        <div class="w-16 h-16 mx-auto mb-6 rounded-2xl flex items-center justify-center bg-red-50">
          <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Link inválido ou expirado</h1>
        <p class="text-sm text-gray-500 mb-6">{{ errorMsg() }}</p>
        <a routerLink="/auth/signup"
           class="block w-full rounded-xl font-semibold text-sm py-3.5 px-6 text-center text-white transition-all active:scale-95"
           style="background: var(--color-brand)">
          Fazer cadastro novamente
        </a>
      }

    </div>
  </div>
</div>
