syntax = "proto3";

package chickie;

// --- Requests ---
message CreateUsuarioRequest {
    string nome = 1;
    string username = 2;
    string senha = 3;
    string email = 4;
    string celular = 5;
    string auth_method = 6;
    string classe = 7;
}

message LoginRequest {
    string identifier = 1;
    string senha = 2;
}

message VerificarEmailRequest {
    string email = 1;
}

message VerificarUsernameRequest {
    string username = 1;
}

message VerificarCelularRequest {
    string celular = 1;
}

message AlternarAtivoRequest {
    bool ativo = 1;
}

message AtualizarDisponibilidadeRequest {
    bool disponivel = 1;
}

message TrocarEmailSenhaRequest {
    string novo_email = 1;
    string nova_senha = 2;
}

message CreateLojaRequest {
    string nome = 1;
    string slug = 2;
    string email_contato = 3;
    string descricao = 4;
    string celular = 5;
    string hora_abertura = 6;
    string hora_fechamento = 7;
    string dias_funcionamento = 8;
    int32 tempo_medio = 9;
    double nota_media = 10;
    double taxa_entrega_base = 11;
    double pedido_minimo = 12;
    int32 max_partes = 13;
}

message CreateProdutoRequest {
    string loja_uuid = 1;
    string categoria_uuid = 2;
    string nome = 3;
    string descricao = 4;
    double preco = 5;
    string imagem_url = 6;
    bool disponivel = 7;
    int32 tempo_preparo_min = 8;
    bool destaque = 9;
}

message AtualizarProdutoRequest {
    string nome = 1;
    string descricao = 2;
    double preco = 3;
    string categoria_uuid = 4;
    int32 tempo_preparo_min = 5;
}

message CreateCategoriaRequest {
    string nome = 1;
    string descricao = 2;
    int32 ordem = 3;
    bool pizza_mode = 4;
}

message UpdateCategoriaRequest {
    string nome = 1;
    string descricao = 2;
    int32 ordem = 3;
    bool pizza_mode = 4;
}

message CreateAdicionalRequest {
    string nome = 1;
    string descricao = 2;
    double preco = 3;
}

message UpdateAdicionalRequest {
    string nome = 1;
    string descricao = 2;
    double preco = 3;
}

message CriarCupomRequest {
    string codigo = 1;
    string descricao = 2;
    string tipo_desconto = 3;
    double valor_desconto = 4;
    double valor_minimo = 5;
    string data_validade = 6;
    int32 limite_uso = 7;
}

message CriarCupomGenericoRequest {
    string loja_uuid = 1;
    string codigo = 2;
    string descricao = 3;
    string tipo_desconto = 4;
    double valor_desconto = 5;
    double valor_minimo = 6;
    string data_validade = 7;
    int32 limite_uso = 8;
}

message AtualizarCupomRequest {
    string loja_uuid = 1;
    string codigo = 2;
    string descricao = 3;
    string tipo_desconto = 4;
    double valor_desconto = 5;
    double valor_minimo = 6;
    string data_validade = 7;
    int32 limite_uso = 8;
}

message AtualizarStatusCupomRequest {
    bool ativo = 1;
}

message EnderecoRequest {
    string cep = 1;
    string logradouro = 2;
    string numero = 3;
    string complemento = 4;
    string bairro = 5;
    string cidade = 6;
    string estado = 7;
    double latitude = 8;
    double longitude = 9;
}

message AdicionarClienteRequest {
    string nome = 1;
    string username = 2;
    string email = 3;
    string senha = 4;
    string celular = 5;
}

message AdicionarEntregadorRequest {
    string nome = 1;
    string username = 2;
    string email = 3;
    string senha = 4;
    string celular = 5;
    string veiculo = 6;
    string placa = 7;
}

message AdicionarFuncionarioRequest {
    string nome = 1;
    string username = 2;
    string email = 3;
    string senha = 4;
    string celular = 5;
    string cargo = 6;
    double salario = 7;
    string data_admissao = 8;
}

message AtualizarEntregadorRequest {
    string usuario_uuid = 1;
    string nome = 2;
    string celular = 3;
    string veiculo = 4;
    string placa = 5;
}

message AtualizarFuncionarioRequest {
    string usuario_uuid = 1;
    string nome = 2;
    string email = 3;
    string senha = 4;
    string celular = 5;
    string cargo = 6;
    double salario = 7;
    string data_admissao = 8;
}

message SalvarConfigPedidoRequest {
    int32 max_partes = 1;
    string tipo_calculo = 2;
}

message CriarOuAtualizarHorarioRequest {
    int32 dia_semana = 1;
    string abertura = 2;
    string fechamento = 3;
    bool ativo = 4;
}

message DefinirAtivoRequest {
    bool ativo = 1;
}

message CriarIngredienteRequest {
    string nome = 1;
    string unidade_medida = 2;
    double preco_unitario = 3;
}

message AtualizarIngredienteRequest {
    string nome = 1;
    string unidade_medida = 2;
    string quantidade = 3;
    double preco_unitario = 4;
}

message AvaliarLojaRequest {
    double nota = 1;
    string comentario = 2;
}

message AvaliarProdutoRequest {
    string produto_uuid = 1;
    double nota = 2;
    string descricao = 3;
    string comentario = 4;
}

message AtualizarAvaliacaoLojaRequest {
    double nota = 1;
    string comentario = 2;
}

message AtualizarAvaliacaoProdutoRequest {
    double nota = 1;
    string descricao = 2;
    string comentario = 3;
}

message CriarPromocaoRequest {
    string nome = 1;
    string descricao = 2;
    string tipo_desconto = 3;
    double valor_desconto = 4;
    double valor_minimo = 5;
    string data_inicio = 6;
    string data_fim = 7;
    repeated uint32 dias_semana_validos = 8;
    string tipo_escopo = 9;
    string produto_uuid = 10;
    string categoria_uuid = 11;
    int32 prioridade = 12;
}

message AtualizarPromocaoRequest {
    string nome = 1;
    string descricao = 2;
    string tipo_desconto = 3;
    double valor_desconto = 4;
    double valor_minimo = 5;
    string data_inicio = 6;
    string data_fim = 7;
    repeated uint32 dias_semana_validos = 8;
    string tipo_escopo = 9;
    string produto_uuid = 10;
    string categoria_uuid = 11;
    int32 prioridade = 12;
}

message AtualizarStatusPedidoRequest {
    string novo_status = 1;
}

message AtribuirEntregadorRequest {
    string entregador_uuid = 1;
}

message ParteItemRequest {
    string produto_uuid = 1;
    int32 posicao = 2;
}

message ItemPedidoRequest {
    int32 quantidade = 1;
    string observacoes = 2;
    repeated ParteItemRequest partes = 3;
}

message CriarPedidoRequest {
    string loja_uuid = 1;
    double taxa_entrega = 2;
    string forma_pagamento = 3;
    string observacoes = 4;
    string codigo_cupom = 5;
    repeated ItemPedidoRequest itens = 6;
    EnderecoRequest endereco_entrega = 7;
}

// --- Usuário ---
message Usuario {
    string nome = 1;
    string username = 2;
    string email = 3;
    string celular = 4;
    string criado_em = 5;
    string atualizado_em = 6;
    string modo_de_cadastro = 7;
    string classe = 8;
    string uuid = 9;
    bool ativo = 10;
    bool passou_pelo_primeiro_acesso = 11;
    bool bloqueado = 12;
}

message ListarUsuariosResponse {
    repeated Usuario usuarios = 1;
}

// --- Loja ---
message Loja {
    string uuid = 1;
    string nome = 2;
    string slug = 3;
    string descricao = 4;
    string email = 5;
    string celular = 6;
    bool ativa = 7;
    string logo_url = 8;
    string banner_url = 9;
    bool bloqueado = 10;
    string horario_abertura = 11;
    string horario_fechamento = 12;
    string dias_funcionamento = 13;
    int32 tempo_preparo_min = 14;
    double taxa_entrega = 15;
    double valor_minimo_pedido = 16;
    double raio_entrega_km = 17;
    string criado_em = 18;
    string atualizado_em = 19;
}

message ListarLojasResponse {
    repeated Loja lojas = 1;
}

// --- Produto & Catálogo ---
message Produto {
    string uuid = 1;
    string nome = 2;
    double preco = 3;
    string descricao = 4;
    bool disponivel = 5;
    string categoria_uuid = 6;
    string loja_uuid = 7;
    string imagem_url = 8;
    int32 tempo_preparo_min = 9;
    bool destaque = 10;
    string criado_em = 11;
    string atualizado_em = 12;
}

message ListarProdutosResponse {
    repeated Produto produtos = 1;
}

message Categoria {
    string uuid = 1;
    string nome = 2;
    string loja_uuid = 3;
    int32 ordem = 4;
    bool pizza_mode = 5;
    string descricao = 6;
    string criado_em = 7;
}

message ListarCategoriasResponse {
    repeated Categoria categorias = 1;
}

message Adicional {
    string uuid = 1;
    string nome = 2;
    double preco = 3;
    bool disponivel = 4;
    string loja_uuid = 5;
    string descricao = 6;
    string criado_em = 7;
}

message ListarAdicionaisResponse {
    repeated Adicional adicionais = 1;
}

// --- Pedido ---
message Pedido {
    string uuid = 1;
    string usuario_uuid = 2;
    string loja_uuid = 3;
    string entregador_uuid = 4;
    string status = 5;
    double total = 6;
    double subtotal = 7;
    double taxa_entrega = 8;
    double desconto = 9;
    string forma_pagamento = 10;
    string observacoes = 11;
    int32 tempo_estimado_min = 12;
    string criado_em = 13;
    string atualizado_em = 14;
    repeated ItemPedido itens = 15;
}

message ItemPedido {
    string uuid = 1;
    string loja_uuid = 2;
    string pedido_uuid = 3;
    int32 quantidade = 4;
    string observacoes = 5;
    repeated ParteDeItemPedido partes = 6;
    repeated AdicionalDeItemDePedido adicionais = 7;
}

message ParteDeItemPedido {
    string uuid = 1;
    string loja_uuid = 2;
    string item_uuid = 3;
    string produto_nome = 4;
    string produto_uuid = 5;
    double preco_unitario = 6;
    int32 posicao = 7;
    repeated AdicionalDeItemDePedido adicionais = 8;
}

message AdicionalDeItemDePedido {
    string uuid = 1;
    string item_uuid = 2;
    string loja_uuid = 3;
    string nome = 4;
    string descricao = 5;
    double preco = 6;
}

message ListarPedidosResponse {
    repeated Pedido pedidos = 1;
}

// --- Marketing & Avaliações ---
message Cupom {
    string uuid = 1;
    string loja_uuid = 2;
    string codigo = 3;
    string descricao = 4;
    string tipo_desconto = 5;
    double valor_desconto = 6;
    double valor_minimo = 7;
    string data_validade = 8;
    int32 limite_uso = 9;
    int32 uso_atual = 10;
    string status = 11;
    string criado_em = 12;
}

message ListarCuponsResponse {
    repeated Cupom cupons = 1;
}

message AvaliacaoLoja {
    string uuid = 1;
    string loja_uuid = 2;
    string usuario_uuid = 3;
    double nota = 4;
    string comentario = 5;
    string criado_em = 6;
    string usuario_nome = 7;
    string usuario_email = 8;
}

message ListarAvaliacoesLojaResponse {
    repeated AvaliacaoLoja avaliacoes = 1;
}

message AvaliacaoProduto {
    string uuid = 1;
    string usuario_uuid = 2;
    string loja_uuid = 3;
    string produto_uuid = 4;
    double nota = 5;
    string descricao = 6;
    string comentario = 7;
    string criado_em = 8;
}

message ListarAvaliacoesProdutoResponse {
    repeated AvaliacaoProduto avaliacoes = 1;
}

message Promocao {
    string uuid = 1;
    string loja_uuid = 2;
    string nome = 3;
    string descricao = 4;
    string tipo_desconto = 5;
    double valor_desconto = 6;
    double valor_minimo = 7;
    string data_inicio = 8;
    string data_fim = 9;
    repeated uint32 dias_semana_validos = 10;
    string tipo_escopo = 11;
    string produto_uuid = 12;
    string categoria_uuid = 13;
    string status = 14;
    int32 prioridade = 15;
    string criado_em = 16;
}

message ListarPromocoesResponse {
    repeated Promocao promocoes = 1;
}

// --- Endereços ---
message Endereco {
    string uuid = 1;
    string cep = 2;
    string logradouro = 3;
    string numero = 4;
    string complemento = 5;
    string bairro = 6;
    string cidade = 7;
    string estado = 8;
    double latitude = 9;
    double longitude = 10;
    string criado_em = 11;
    string usuario_uuid = 12;
    string loja_uuid = 13;
}

message ListarEnderecosResponse {
    repeated Endereco enderecos = 1;
}

// --- Operacional ---
message Funcionario {
    string uuid = 1;
    string loja_uuid = 2;
    string usuario_uuid = 3;
    string cargo = 4;
    double salario = 5;
    string data_admissao = 6;
    string criado_em = 7;
}

message ListarFuncionariosResponse {
    repeated Funcionario funcionarios = 1;
}

message Entregador {
    string uuid = 1;
    string loja_uuid = 2;
    string usuario_uuid = 3;
    string veiculo = 4;
    string placa = 5;
    bool disponivel = 6;
    string criado_em = 7;
}

message ListarEntregadoresResponse {
    repeated Entregador entregadores = 1;
}

message Cliente {
    string uuid = 1;
    string usuario_uuid = 2;
    string loja_uuid = 3;
    string criado_em = 4;
}

message LojaFavorita {
    string uuid = 1;
    string usuario_uuid = 2;
    string loja_uuid = 3;
    string criado_em = 4;
}

message ListarLojasFavoritasResponse {
    repeated LojaFavorita favoritas = 1;
}

message HorarioFuncionamento {
    string uuid = 1;
    string loja_uuid = 2;
    int32 dia_semana = 3;
    string abertura = 4;
    string fechamento = 5;
    bool ativo = 6;
    string criado_em = 7;
}

message ListarHorariosResponse {
    repeated HorarioFuncionamento horarios = 1;
}

message Ingrediente {
    string uuid = 1;
    string loja_uuid = 2;
    string nome = 3;
    string unidade_medida = 4;
    string quantidade = 5;
    double preco_unitario = 6;
    string criado_em = 7;
    string atualizado_em = 8;
}

message ListarIngredientesResponse {
    repeated Ingrediente ingredientes = 1;
}

message ConfigPedido {
    string uuid = 1;
    string loja_uuid = 2;
    int32 max_partes = 3;
    string tipo_calculo = 4;
    string criado_em = 5;
    string atualizado_em = 6;
}

// --- Respostas ---
message LoginResponse {
    string access_token = 1;
    string token_type = 2;
    Usuario usuario = 3;
}

message GenericResponse {
    string message = 1;
    bool success = 2;
}

message UuidResponse {
    string uuid = 1;
}

message DisponibilidadeResponse {
    bool disponivel = 1;
    bool favorita = 2;
}

message SlugDisponivelResponse {
    bool disponivel = 1;
    string slug = 2;
}

message PedidoStatusResponse {
    string uuid = 1;
    string status = 2;
    repeated string transicoes_permitidas = 3;
}

message PedidoComEntregaResponse {
    Pedido pedido = 1;
    Endereco endereco_entrega = 2;
}

message PedidoComEntregadorResponse {
    Pedido pedido = 1;
    string entregador_nome = 2;
    string veiculo = 3;
    string placa = 4;
}

message SubirImagemResponse {
    string uuid = 1;
    string imagem_url = 2;
    string message = 3;
}

message ErrorResponse {
    string error = 1;
    uint32 status = 2;
}
